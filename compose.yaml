services:
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: paintstreakdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - ./db:/docker-entrypoint-initdb.d

  backend:
    image: "paintstreak-backend:dev"
    build: backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: backend
          target: /app
          initial_sync: true
        - action: rebuild
          path: backend/requirements.txt

  frontend:
    image: "paintstreak-frontend:dev"
    build: frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: frontend
          target: /app
          initial_sync: true
        - action: rebuild
          path: frontend/package.json

