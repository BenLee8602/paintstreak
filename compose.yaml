services:
  frontend:
    build: frontend
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: frontend
          target: /app
          initial_sync: true
        - action: rebuild
          path: frontend/package.json

  backend:
    build: backend
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: backend
          target: /app
          initial_sync: true
        - action: rebuild
          path: backend/requirements.txt

