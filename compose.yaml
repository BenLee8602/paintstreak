services:
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: paintstreakdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d paintstreakdb -U user"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: "paintstreak-backend:dev"
    build: backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      REFRESH_TOKEN_SECRET: refresh-token-secret
      ACCESS_TOKEN_SECRET: access-token-secret
    develop:
      watch:
        - action: sync
          path: backend
          target: /app
          initial_sync: true
        - action: rebuild
          path: backend/requirements.txt

  frontend:
    image: "paintstreak-frontend:dev"
    build: frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: "http://localhost:8000"
    develop:
      watch:
        - action: sync
          path: frontend
          target: /app
          initial_sync: true
        - action: rebuild
          path: frontend/package.json

